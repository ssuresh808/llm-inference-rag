# Render Blueprint - deploys the two Docker services (FastAPI + Streamlit).
#
# A3 hybrid cloud stack: LLM via Anthropic (Claude), embeddings via local
# bge-large (sentence-transformers, downloaded on first use, runs in-container),
# and vectors via Qdrant Cloud. Same image as `docker compose`; only the env
# vars change - the provider factories and the QDRANT_CLOUD_URL fallback do the rest.
#
# Secrets use `sync: false`: Render prompts for them during Blueprint creation
# and they are never committed.
services:
  - type: web
    name: rag-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: EMBEDDING_MODEL
        value: BAAI/bge-large-en-v1.5
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-sonnet-4-6
      - key: GENERATION_MODE
        value: agent
      - key: QDRANT_COLLECTION
        value: llm_optimization_domain
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: QDRANT_CLOUD_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  - type: web
    name: rag-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: streamlit run src/frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: starter
    region: oregon
    envVars:
      # After the first deploy, set this to the backend's public URL,
      # e.g. https://rag-backend.onrender.com
      - key: RAG_API_URL
        sync: false
